<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Flaskr</title>

    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<header>
    <h1>Flaskr</h1>
    <nav>
        <ul>
            <li><a href="index.html">Inicio</a></li>
            <li><a href="login.html">Login</a></li>
            <li><a href="registro.html">Registro</a></li>
            <li><a href="encuestas.html">Encuestas</a></li>
            <li><a href="profile.html">Perfil</a></li>
            <li><a href="post.html">Post</a></li>
            <li><a href="post-view.html">Ver Posts</a></li>
        </ul>
    </nav>
</header>

<main>
    <h2>Login de usuario</h2>

    <div class="lista-encuestas">
        <form id="loginForm">

            <label>Email:</label>
            <input type="email" id="email" maxlength="80" required>
            <label>Contraseña:</label>
            <div class="password-container">
                <input type="password" id="password" minlength="6" required>
                <span id="togglePassword" class="eye-icon">👁️</span>
            </div>

            <div class="captcha-container">
                <div
                    class="h-captcha"
                    data-sitekey="c1e29b90-67fc-4a54-8de6-a394287af852"
                    data-theme="dark"
                ></div>
            </div>

            <button type="submit">Iniciar sesión</button>

        </form>
    </div>

    <p id="status"></p>
</main>

<footer>
    <p>Creado por Lautaro Hillkirk</p>
</footer>
<script src="scripts/password-view.js"></script>
<script src="https://js.hcaptcha.com/1/api.js" async defer></script>
<script src="scripts/login.js"></script>
</body>
</html>
