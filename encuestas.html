<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encuestas - Flaskr</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header>
        <h1>Flaskr</h1>
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="login.html">Login</a></li>
                <li><a href="registro.html">Registro</a></li>
                <li><a href="encuestas.html">Encuestas</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h2>Encuestas</h2>
        <div class="lista-encuestas">
            <form id="encuestaForm">
                <label for="Pregunta">Pregunta:</label>
                <input
                    type="text"
                    id="Pregunta"
                    name="Pregunta"
                    placeholder="Escribe tu pregunta"
                    maxlength="100"
                    required
                >

                <label for="Opcion1">Opción 1:</label>
                <input
                    type="text"
                    id="Opcion1"
                    name="Opcion1"
                    placeholder="Primera opción"
                    maxlength="100"
                    required
                >

                <label for="Opcion2">Opción 2:</label>
                <input
                    type="text"
                    id="Opcion2"
                    name="Opcion2"
                    placeholder="Segunda opción"
                    maxlength="100"
                    required
                >

                <button type="submit">Crear Encuesta</button>
            </form>
        </div>
        <p>Esta encuesta permite guardar las preguntas y opciones de respuesta en una tabla de supabase, no tiene primary key ni relaciones, por ahora.</p>
    </main>

    <footer>
        <p>Creado por Lautaro Hillkirk</p>
    </footer>
<script>
const supabaseKey = "sb_publishable_ut3DRPMELPw-6nCvxSbMjA_Cttmj4FA";
const supabaseUrl = "https://ftbyjjmvflxlotnkauwd.supabase.co";

const client = window.supabase.createClient(
    supabaseUrl,
    supabaseKey
);

// anti spam
let lastSubmit = 0;

function sanitize(input) {
    return input.replace(/</g, "&lt;").replace(/>/g, "&gt;").trim();
}

const form = document.getElementById("encuestaForm");

form.addEventListener("submit", async (e) => {
    e.preventDefault();

    if (Date.now() - lastSubmit < 5000) {
        alert("Espera 5 segundos antes de enviar otra encuesta");
        return;
    }
    lastSubmit = Date.now();

    const pregunta = sanitize(document.getElementById("Pregunta").value);
    const opcion1 = sanitize(document.getElementById("Opcion1").value);
    const opcion2 = sanitize(document.getElementById("Opcion2").value);

    if (pregunta.length < 5) {
        alert("Pregunta muy corta");
        return;
    }

    if (opcion1 === opcion2) {
        alert("Opciones iguales no válidas");
        return;
    }

    const { error } = await client
        .from("Encuesta")
        .insert([
            {
                Pregunta: pregunta,
                Opcion1: opcion1,
                Opcion2: opcion2
            }
        ]);

    if (error) {
        console.error(error);
        alert(error.message);
        return;
    }

    alert("Encuesta creada correctamente");
    form.reset();
});
</script>
</body>
</html>
