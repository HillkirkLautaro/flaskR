<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Flaskr</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script id="hcaptcha-script" src="https://js.hcaptcha.com/1/api.js" async defer></script>
                
</head>
<body>
    <header>
        <h1>Flaskr</h1>
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="login.html">Login</a></li>
                <li><a href="registro.html">Registro</a></li>
                <li><a href="encuestas.html">Encuestas</a></li>
                <li><a href="profile.html">Perfil</a></li>
                <li><a href="post.html">Post</a></li>
                <li><a href="post-view.html">Ver Posts</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h2>Registro de usuario</h2>

        <div class="lista-encuestas">
            <form id="registroForm">
                <label>Usuario:</label>
                <input type="text" id="username" maxlength="30" required>

                <label>Email:</label>
                <input type="email" id="email" maxlength="80" required>

                <label>Contraseña:</label>
                <div class="password-container">
                    <input type="password" id="password" minlength="6" required>
                    <span id="togglePassword" class="eye-icon">👁️</span>
                </div>

                <label>Confirmar contraseña:</label>
                <div class="password-container">
                    <input type="password" id="confirmPassword" minlength="6" required>
                </div>
                <div
                class="h-captcha"
                data-sitekey="c1e29b90-67fc-4a54-8de6-a394287af852"
                data-theme="dark"
                ></div>
                <button type="submit">Registrarse</button>
            </form>
        </div>

        <p>Registro con Supabase Auth + profiles</p>
    </main>

    <footer>
        <p>Creado por Lautaro Hillkirk</p>
    </footer>
</body>
<script src="scripts/password-view.js"></script>
<script src="scripts/registro.js"></script>
</html>
