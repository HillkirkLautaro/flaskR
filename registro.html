<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Flaskr</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script id="hcaptcha-script" src="https://js.hcaptcha.com/1/api.js" async defer></script>
                
</head>
<body>
    <header>
        <h1>Flaskr</h1>
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="login.html">Login</a></li>
                <li><a href="registro.html">Registro</a></li>
                <li><a href="encuestas.html">Encuestas</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h2>Registro de usuario</h2>

        <div class="lista-encuestas">
            <form id="registroForm">
                <label>Usuario:</label>
                <input type="text" id="username" maxlength="30" required>

                <label>Email:</label>
                <input type="email" id="email" maxlength="80" required>

                <label>Contraseña:</label>
                <input type="password" id="password" minlength="6" required>

                <label>Confirmar contraseña:</label>
                <input type="password" id="confirmPassword" minlength="6" required>
                 <div
                class="h-captcha"
                data-sitekey="c1e29b90-67fc-4a54-8de6-a394287af852"
                data-theme="dark"
                ></div>
                <button type="submit">Registrarse</button>
            </form>
        </div>

        <p>Registro con Supabase Auth + profiles</p>
    </main>

    <footer>
        <p>Creado por Lautaro Hillkirk</p>
    </footer>

<script>
const supabaseKey = "sb_publishable_ut3DRPMELPw-6nCvxSbMjA_Cttmj4FA";
const supabaseUrl = "https://ftbyjjmvflxlotnkauwd.supabase.co";

const client = window.supabase.createClient(supabaseUrl, supabaseKey);

let lastSubmit = 0;

function sanitize(input) {
    return input.replace(/</g, "&lt;").replace(/>/g, "&gt;").trim();
}

const form = document.getElementById("registroForm");

form.addEventListener("submit", async (e) => {
    e.preventDefault();

    // anti spam
    if (Date.now() - lastSubmit < 5000) {
        alert("Espera 5 segundos antes de registrarte otra vez");
        return;
    }
    lastSubmit = Date.now();

    const username = sanitize(document.getElementById("username").value);
    const email = sanitize(document.getElementById("email").value);
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    const captchaToken = hcaptcha.getResponse();

    if (!captchaToken) {
        alert("Completa el captcha");
        return;
    }

    if (password !== confirmPassword) {
        alert("Las contraseñas no coinciden");
        return;
    }

    if (username.length < 3) {
        alert("Usuario muy corto");
        return;
    }

    // AUTH con captcha
    const { data, error } = await client.auth.signUp({
        email: email,
        password: password,
        options: {
            captchaToken: captchaToken
        }
    });

    if (error) {
        console.error(error);
        alert("Error auth: " + error.message);
        return;
    }

    const userId = data.user.id;

    // profile
    const { error: profileError } = await client
        .from("profiles")
        .insert([
            {
                id: userId,
                username: username
            }
        ]);

    if (profileError) {
        console.error(profileError);
        alert("Usuario creado pero error en perfil");
        return;
    }

    alert("Usuario registrado correctamente");
    form.reset();
    hcaptcha.reset();
});
</script>

</body>
</html>
